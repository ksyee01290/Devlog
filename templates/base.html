<!DOCTYPE html>
<html>

<head>
    <title>Devlog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Devlog</a>
            <div>
                <a class="nav-link text-white" href="/">홈</a>
                {% if session["username"] %}
                <a class="nav-link text-white" href="/write">글쓰기</a>
                <a class="nav-link text-white" href="/logout">로그아웃</a>
                {% else %}
                <a class="nav-link text-white" href="/login">로그인</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
