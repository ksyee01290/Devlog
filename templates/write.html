{% extends "base.html" %}

{% block content %}
    <h2>글쓰기</h2>
    <form method="POST">
        <div class="mb-3">
            <label>제목</label>
            <input type="text" name="title" class="form-control">
        </div>
        <div class="mb-3">
            <label>내용</label>
            <textarea name="content" class="form-control" rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">작성완료</button>
    </form>
{% endblock %}
